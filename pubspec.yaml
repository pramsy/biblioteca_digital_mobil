name: biblioteca_digital
description: "Sistema de Biblioteca Digital"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_dotenv: ^5.1.0
  intl: ^0.18.1
  get_it: ^7.6.4
  equatable: ^2.0.5
  bcrypt: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
